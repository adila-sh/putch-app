name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag:
        description: "Tag a publicar (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v3.0.0-alpha2.117"

jobs:
  release-linux:
    name: Release (Linux x64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libwebkitgtk-6.0-dev pkg-config \
            libgirepository1.0-dev librsvg2-dev dpkg-dev file imagemagick \
            rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Resolve version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Inject version into nfpm config
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          sed -i "s/^version: .*/version: \"${VERSION}\"/" build/linux/nfpm/nfpm.yaml

      - name: Build binary + AppImage
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          task linux:create:appimage

      - name: Build .deb / .rpm
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          task linux:create:deb
          task linux:create:rpm

      - name: Package tarball
        id: pkg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist

          # Renomeia AppImage com versão
          APPIMG_SRC=$(ls bin/*.AppImage | head -n1)
          APPIMG="putch-${VERSION}-x86_64.AppImage"
          cp "$APPIMG_SRC" "dist/${APPIMG}"
          (cd dist && sha256sum "${APPIMG}" > "${APPIMG}.sha256")
          echo "appimage=${APPIMG}" >> "$GITHUB_OUTPUT"

          # Tarball com binário + ícone + .desktop
          mkdir -p dist/pkg
          cp bin/putch dist/pkg/putch
          cp build/appicon.png dist/pkg/putch.png
          cp build/linux/putch.desktop dist/pkg/putch.desktop

          TAR="putch-${VERSION}-linux-amd64.tar.gz"
          tar -C dist/pkg -czf "dist/${TAR}" \
            putch putch.png putch.desktop
          (cd dist && sha256sum "${TAR}" > "${TAR}.sha256")
          echo "tar=${TAR}" >> "$GITHUB_OUTPUT"

          # .deb / .rpm com versão no nome
          DEB_SRC=$(ls bin/*.deb | head -n1)
          DEB="putch-${VERSION}-amd64.deb"
          cp "$DEB_SRC" "dist/${DEB}"
          (cd dist && sha256sum "${DEB}" > "${DEB}.sha256")
          echo "deb=${DEB}" >> "$GITHUB_OUTPUT"

          RPM_SRC=$(ls bin/*.rpm | head -n1)
          RPM="putch-${VERSION}-amd64.rpm"
          cp "$RPM_SRC" "dist/${RPM}"
          (cd dist && sha256sum "${RPM}" > "${RPM}.sha256")
          echo "rpm=${RPM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.pkg.outputs.tar }}
            dist/${{ steps.pkg.outputs.tar }}.sha256
            dist/${{ steps.pkg.outputs.appimage }}
            dist/${{ steps.pkg.outputs.appimage }}.sha256
            dist/${{ steps.pkg.outputs.deb }}
            dist/${{ steps.pkg.outputs.deb }}.sha256
            dist/${{ steps.pkg.outputs.rpm }}
            dist/${{ steps.pkg.outputs.rpm }}.sha256

  release-windows:
    name: Release (Windows x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate bindings
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails3 generate bindings -clean

      - name: Generate syso (icon + manifest)
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          cd build
          wails3 generate syso \
            -arch amd64 \
            -icon windows/icon.ico \
            -manifest windows/wails.exe.manifest \
            -info windows/info.json \
            -out ../wails_windows_amd64.syso

      - name: Frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend build
        working-directory: frontend
        run: bun --bun run build

      - name: Backend build
        shell: bash
        run: |
          mkdir -p bin
          go build -tags production -trimpath -buildvcs=false \
            -ldflags "-w -s -H windowsgui" \
            -o bin/putch.exe .
          rm -f wails_windows_*.syso

      - name: Package
        id: pkg
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $zip = "putch-$env:VERSION-windows-amd64.zip"
          Compress-Archive -Path bin/putch.exe -DestinationPath "dist/$zip" -Force
          $zipHash = (Get-FileHash "dist/$zip" -Algorithm SHA256).Hash.ToLower()
          "$zipHash  $zip" | Out-File -FilePath "dist/$zip.sha256" -Encoding ascii -NoNewline

          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.pkg.outputs.zip }}
            dist/${{ steps.pkg.outputs.zip }}.sha256
